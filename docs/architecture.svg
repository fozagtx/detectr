<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-label="Detectr architecture diagram">
  <rect width="1000" height="620" fill="#0B0F14"/>
  <text x="40" y="44" fill="#F0E28A" font-family="ui-sans-serif,system-ui,sans-serif" font-size="24" font-weight="700">DETECTR - System Architecture</text>
  <text x="40" y="70" fill="#A1A1AA" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">Global AI Hackathon with Qwen Cloud · Track 3: Agent Society</text>

  <!-- Frontend -->
  <rect x="40" y="100" width="200" height="88" fill="#141A22" stroke="#F2EDE4" stroke-width="2"/>
  <text x="140" y="136" text-anchor="middle" fill="#F2EDE4" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">Frontend</text>
  <text x="140" y="158" text-anchor="middle" fill="#A1A1AA" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Next.js App Router</text>
  <text x="140" y="176" text-anchor="middle" fill="#71717A" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">HeroUI · Brutalism UI</text>

  <!-- API -->
  <rect x="280" y="100" width="220" height="88" fill="#141A22" stroke="#F2EDE4" stroke-width="2"/>
  <text x="390" y="136" text-anchor="middle" fill="#F2EDE4" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">Backend API</text>
  <text x="390" y="158" text-anchor="middle" fill="#A1A1AA" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">/api/analyze · /api/detective</text>
  <text x="390" y="176" text-anchor="middle" fill="#71717A" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">/api/demo</text>

  <!-- Orchestrator -->
  <rect x="540" y="100" width="240" height="88" fill="#141A22" stroke="#F0E28A" stroke-width="2"/>
  <text x="660" y="136" text-anchor="middle" fill="#F0E28A" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">LangGraph Orchestrator</text>
  <text x="660" y="158" text-anchor="middle" fill="#A1A1AA" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Agent Society StateGraph</text>
  <text x="660" y="176" text-anchor="middle" fill="#71717A" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">src/agents/orchestrator.ts</text>

  <!-- Store -->
  <rect x="820" y="100" width="140" height="88" fill="#141A22" stroke="#F2EDE4" stroke-width="2"/>
  <text x="890" y="140" text-anchor="middle" fill="#F2EDE4" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">Case Store</text>
  <text x="890" y="162" text-anchor="middle" fill="#A1A1AA" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">memory + /tmp</text>
  <text x="890" y="178" text-anchor="middle" fill="#71717A" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">JSON cases</text>

  <line x1="240" y1="144" x2="280" y2="144" stroke="#52525B" stroke-width="2"/>
  <line x1="500" y1="144" x2="540" y2="144" stroke="#52525B" stroke-width="2"/>
  <line x1="780" y1="144" x2="820" y2="144" stroke="#52525B" stroke-width="2"/>

  <!-- Agents row -->
  <text x="40" y="230" fill="#F2EDE4" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700">Agent Society pipeline</text>
  <rect x="40" y="244" width="110" height="52" fill="#1A222C" stroke="#71717A"/>
  <text x="95" y="275" text-anchor="middle" fill="#E4E4E7" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Extractor</text>
  <rect x="160" y="244" width="110" height="52" fill="#1A222C" stroke="#71717A"/>
  <text x="215" y="275" text-anchor="middle" fill="#E4E4E7" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Physics</text>
  <rect x="280" y="244" width="110" height="52" fill="#1A222C" stroke="#71717A"/>
  <text x="335" y="275" text-anchor="middle" fill="#E4E4E7" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">CrossRef</text>
  <rect x="400" y="244" width="110" height="52" fill="#1A222C" stroke="#71717A"/>
  <text x="455" y="275" text-anchor="middle" fill="#E4E4E7" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Debate</text>
  <rect x="520" y="244" width="110" height="52" fill="#1A222C" stroke="#71717A"/>
  <text x="575" y="275" text-anchor="middle" fill="#E4E4E7" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Director</text>
  <rect x="640" y="244" width="110" height="52" fill="#1A222C" stroke="#71717A"/>
  <text x="695" y="275" text-anchor="middle" fill="#E4E4E7" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Visualizer</text>
  <rect x="760" y="244" width="110" height="52" fill="#1A222C" stroke="#71717A"/>
  <text x="815" y="275" text-anchor="middle" fill="#E4E4E7" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Detective</text>
  <rect x="880" y="244" width="80" height="52" fill="#1A222C" stroke="#71717A"/>
  <text x="920" y="275" text-anchor="middle" fill="#E4E4E7" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Baseline</text>

  <line x1="660" y1="188" x2="660" y2="244" stroke="#52525B" stroke-width="1.5"/>

  <!-- Alibaba Cloud -->
  <rect x="40" y="340" width="920" height="200" fill="#12181F" stroke="#F0E28A" stroke-width="2"/>
  <text x="60" y="372" fill="#F0E28A" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700">Alibaba Cloud (Qwen Cloud / DashScope + OSS)</text>

  <rect x="60" y="396" width="420" height="120" fill="#0B0F14" stroke="#F2EDE4" stroke-width="1.5"/>
  <text x="80" y="428" fill="#F2EDE4" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">DashScope Model Studio</text>
  <text x="80" y="452" fill="#A1A1AA" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Chat: dashscope-intl…/compatible-mode/v1</text>
  <text x="80" y="472" fill="#A1A1AA" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Model: qwen3.7-plus (LangChain ChatOpenAI)</text>
  <text x="80" y="492" fill="#A1A1AA" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Video: Wan / HappyHorse T2V async API</text>

  <rect x="520" y="396" width="420" height="120" fill="#0B0F14" stroke="#F2EDE4" stroke-width="1.5"/>
  <text x="540" y="428" fill="#F2EDE4" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">Object Storage Service (OSS)</text>
  <text x="540" y="452" fill="#A1A1AA" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Persist scene reconstruction MP4s</text>
  <text x="540" y="472" fill="#A1A1AA" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">SDK: ali-oss · region oss-ap-southeast-1</text>
  <text x="540" y="492" fill="#F0E28A" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Proof: src/lib/alibaba.ts</text>

  <line x1="390" y1="296" x2="270" y2="396" stroke="#3F3F46" stroke-width="1.5"/>
  <line x1="695" y1="296" x2="730" y2="396" stroke="#3F3F46" stroke-width="1.5"/>

  <text x="40" y="580" fill="#71717A" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Live only — no mock agents. Every analysis step calls Alibaba Cloud DashScope; optional clips upload to OSS.</text>
  <text x="40" y="602" fill="#52525B" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Demo: https://getdetectr.vercel.app · Repo: https://github.com/fozagtx/detectr</text>
</svg>
